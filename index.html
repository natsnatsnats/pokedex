<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pokedex Customizada</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main>
  <img src="https://raw.githubusercontent.com/natsnatsnats/imagem/main/Design%20sem%20nome.png" 
       alt="Pokedex" 
       class="pokedex">

  <div class="screen">
    <img class="pokemon__image" src="" alt="pokemon image">
  </div>

  <h1 class="pokemon__data">
    <span class="pokemon__number">1</span> -
    <span class="pokemon__name">bulbasaur</span>
  </h1>

  <form class="form">
    <input type="search" class="input__search" placeholder="Name or Number" required>
  </form>

  <div class="buttons">
    <button class="button btn-prev">Prev &lt;</button>
    <button class="button btn-next">Next &gt;</button>
  </div>

  <div class="info">
    <div class="info-bg"></div>
    <div class="info-text"></div>
  </div>

</main>

<script src="script.js"></script>
</body>
</html>
